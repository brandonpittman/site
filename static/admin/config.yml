# Sveltia CMS config. Local editing: open /admin/, "Work with Local Repository",
# pick the repo root (Chromium only). For remote editing, deploy the OAuth worker
# (workers/sveltia-cms-auth) and uncomment base_url below.
backend:
  name: github
  repo: brandonpittman/site
  branch: main # overwritten per-deployment by scripts/set-cms-config.js
  # OAuth relay worker origin (Sveltia appends /auth and /callback).
  base_url: https://site-cms-auth.brandonpittman.workers.dev

site_url: https://brandonpittman.com
display_url: https://brandonpittman.com

# Required for the image widget even if unused by text-only content.
media_folder: static/images/cms
public_folder: /images/cms

collections:
  # Notes — one markdown file per entry, prose in the body.
  - name: notes
    label: Notes
    label_singular: Note
    folder: content/notes
    extension: md
    format: frontmatter
    create: true
    slug: '{{slug}}'
    sortable_fields: [date, title]
    fields:
      - { name: title, label: Title, widget: string }
      - { name: date, label: Date, widget: datetime, date_format: YYYY-MM-DD, time_format: false, picker_utc: true }
      - { name: location, label: Location, widget: string, required: false }
      - { name: description, label: Description, widget: text, required: false }
      - { name: deprecated, label: Deprecated, widget: boolean, default: false, required: false }
      - { name: successor, label: Successor slug, widget: string, required: false }
      - { name: draft, label: Draft, widget: boolean, default: true, required: false }
      - { name: body, label: Body, widget: markdown }

  # Books — one file per book; `status` picks the list it renders in.
  - name: books
    label: Books
    label_singular: Book
    folder: content/books
    extension: md
    format: frontmatter
    create: true
    slug: '{{slug}}'
    summary: '{{title}} — {{status}}'
    sortable_fields: [title, status]
    fields:
      - { name: title, label: Title, widget: string }
      - { name: author, label: Author, widget: string }
      - { name: note, label: Note, widget: string, required: false }
      - { name: status, label: Status, widget: select, default: unread, options: [
            { label: Unread, value: unread }, { label: Reading, value: reading },
            { label: Read, value: read }, { label: Abandoned, value: abandoned } ] }

  # Games — one file per game; `status` picks the list it renders in.
  - name: games
    label: Games
    label_singular: Game
    folder: content/games
    extension: md
    format: frontmatter
    create: true
    slug: '{{slug}}'
    summary: '{{title}} — {{status}}'
    sortable_fields: [title, status]
    fields:
      - { name: title, label: Title, widget: string }
      - { name: platform, label: Platform, widget: string }
      - { name: note, label: Note, widget: string, required: false }
      - { name: status, label: Status, widget: select, default: unplayed, options: [
            { label: Unplayed, value: unplayed }, { label: Unbeaten, value: unbeaten },
            { label: Beaten, value: beaten }, { label: Abandoned, value: abandoned } ] }
